    <!-- CREATE ANNOUNCEMENT MODAL -->
    <dialog id="create-announcement-modal" class="create-announcement-modal">
        <div class="modal-top-line">
            <p class="modal-title" id="create-announcement-modal-title">CREATE ANNOUNCEMENT</p><button
                class="modal-close-button" id="close-create-announcement-modal"><img
                    src="/black-icons/icons8-close-24.png"></button>
        </div>
        <form id="create-announcement-modal-form" method="post" action="/api/instructor/create-announcement">
            <div class = "modal-row">
                <label for=""create-announcement-course-dropdown>Create for</label>
                <select id = "create-announcement-course-dropdown" name="courseId">
                    <option>Select Course</option>
                </select>
            </div>
            <div class = "modal-block">
                <label for="create-announcement-ask-title">Title</label>
                <input type="text" id="create-announcement-ask-title" placeholder="Announcement title" name="title">
            </div>
            <div class = "modal-block">
                <label for="create-announcement-message-body">Message</label>
                <textarea id="create-announcement-message-body" placeholder="Announcement message body..." name="message"></textarea>
            </div>            
        </form>
        <div class="modal-button-row">
            <button type="submit" id="create-announcement-submit-button" class="create-announcement-submit-button" form="create-announcement-modal-form">
                CREATE</button>
        </div>

    </dialog>
