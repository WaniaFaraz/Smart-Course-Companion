    <title>Smart Course Companion</title>

    <link rel="stylesheet" href="/css/CourseOrganizer_GeneralStyles.css">
    <script type="text/javascript" src="/scripts/instructor_announcements_scripts.js" defer></script>

</head>

<!-- LEFT MENU -->

<body>
    <div class="left">
        <div class="left-title sub-title" id="left-title">COURSE COMPANION</div>
        <nav class="left-menu-top">
            <ul>
                <li class="left-menu-option"><img src="/white-icons/white-4-square-grid-96.png"><a
                        href="home">Dashboard</a>
                </li>
                <li class="left-menu-option"><img src="/white-icons/white-class-96.png"><a href="home"
                        id="left-menu-all-classes">All Classes</a>
                </li>
                <li class="left-menu-option"><img src="/white-icons/white-messages-288.png"><a href="announcements">Announcements</a>
                </li>
                <!--
                <br>
                    <div class = "all-classes-dropdown" id = "all-classes-menu-dropdown">
                        
                    </div>
                </li>
                -->
            </ul>
        </nav>
        <nav class="left-menu-bottom">
            <ul>

                <li class="left-menu-option"><img src="/white-icons/white-sign-out-96.png"><a href="log-out">Log out</a>
                    </p>
                <li class="left-menu-option"><img src="/white-icons/white-settings-288.png"><a
                        href="account-settings">Settings</a></p>
                <li class="left-menu-option"><img src="/white-icons/white-help-96.png"><a href="">Help</a>
            </ul>
        </nav>
    </div>

    <!-- MAIN RIGHT SIDE OF PAGE -->

    <div class="main">
        <!-- TOP BAR OF THE MAIN PAGE -->
        <div class="center-top">
            <div class="uppermost-center-line">
                <div class="instructor-welcome-message">
                    <p class="center-title">WELCOME PROFESSOR X</p>
                    <p class="current-course-count">YOU'RE CURRENTLY MANAGING 4 COURSES</p>
                </div>
                <div class="left-icons-in-uppermost-center-line">
                    <div class="search-bar-container">
                        <div><img class="search-icon" src="/black-icons/black-search-480.png"></div>
                        <input type="text" class="search-bar-input" placeholder="Search"></input>
                    </div>
                    <div class="notifications"><img class="notifications-icon"
                            src="/black-icons/black_notification-96.png">
                    </div>

                    <div class="edit-container">
                        <a class="edit-courses-icon-anchor" id="edit-courses-icon-anchor">

                            <div class="edit-courses-menu">
                                <div class="hamburger-menu-button">
                                    <span class="hamburger-bar"></span>
                                    <span class="hamburger-bar"></span>
                                    <span class="hamburger-bar"></span>
                                </div>


                            </div>
                        </a>
                        <dialog class="edit-or-delete-pop-up" id="edit-or-delete-pop-up" closedby="any">
                            <p>EDIT COURSES</p>
                            <li id="list-of-courses-to-edit">

                            </li>
                        </dialog>
                    </div>
                    <dialog class="edit-course-modal" id="edit-course-modal">
                        <div class="modal-top-line">
                            <p class="modal-title" id="edit-modal-title">EDIT COURSE</p><button
                                class="modal-close-button" id="close-edit-modal"><img
                                    src="/black-icons/icons8-close-24.png"></button>
                        </div>
                        <form id="edit-course-modal-form" method="post">
                            <div class="modal-row">
                                <div class="ask-title">
                                    <label class="modal-form-label" for="edit-ask-title">Title</label><input type="text"
                                        id="edit-ask-title" name="title" class="modal-input"
                                        placeholder="ex: Applied Advanced Calculus" value="null" />
                                </div>
                            </div>
                            <div class="modal-row modal-row-2">
                                <div class="ask-code">
                                    <label class="modal-form-label" for="edit-ask-code">Course Code</label><input
                                        type="text" id="edit-ask-code" name="code" class="modal-input"
                                        placeholder="ex: ENGR 233" value="null" />
                                </div>

                                <div class="ask-section">
                                    <label class="modal-form-label" for="edit-select-section">Section</label>
                                    <select id="edit-select-section" class="modal-input" name="section">
                                        <option value="null">No change</option>


                                    </select>
                                </div>
                            </div>
                            <label class="bg-modal-form-label">Background</label>
                            <div class="modal-select-background">
                                <input type="radio" name="radioCourseBg" value="null" id="edit-radio-bg-null"><label
                                    class="edit-radio-none" for="edit-radio-bg-null">No change</label>
                                <br>
                                <input type="radio" name="radioCourseBg" value="1" class="modal-radio"
                                    id="edit-radio-1"></input><label for="edit-radio-1"><img class="bg-img-option"
                                        src="/course-images/IMG-20260215-WA0009.jpg"></label>
                                <input type="radio" name="radioCourseBg" value="2" class="modal-radio"
                                    id="edit-radio-2"></input><label for="edit-radio-2"><img class="bg-img-option"
                                        src="/course-images/IMG-20260215-WA0005.jpg"></label>
                                <input type="radio" name="radioCourseBg" value="3" class="modal-radio"
                                    id="edit-radio-3"></input><label for="edit-radio-3"><img class="bg-img-option"
                                        src="/course-images/IMG-20260215-WA0020.jpg"></label>
                                <input type="radio" name="radioCourseBg" value="4" class="modal-radio"
                                    id="edit-radio-4"></input><label for="edit-radio-4"><img class="bg-img-option"
                                        src="/course-images/IMG-20260215-WA0006.jpg"></label>
                                <input type="radio" name="radioCourseBg" value="5" class="modal-radio"
                                    id="edit-radio-5"></input><label for="edit-radio-5"><img class="bg-img-option"
                                        src="/course-images/IMG-20260215-WA0011.jpg"></label>
                                <input type="radio" name="radioCourseBg" value="6" class="modal-radio"
                                    id="edit-radio-6"></input><label for="edit-radio-6"><img class="bg-img-option"
                                        src="/course-images/IMG-20260215-WA0013.jpg"></label>
                                <input type="radio" name="radioCourseBg" value="7" class="modal-radio"
                                    id="edit-radio-7"></input><label for="edit-radio-7"><img class="bg-img-option"
                                        src="/course-images/IMG-20260215-WA0023.jpg"></label>
                                <input type="radio" name="radioCourseBg" value="8" class="modal-radio"
                                    id="edit-radio-8"></input><label for="edit-radio-8"><img class="bg-img-option"
                                        src="/course-images/IMG-20260215-WA0024.jpg"></label>
                                <input type="radio" name="radioCourseBg" value="9" class="modal-radio"
                                    id="edit-radio-9"></input><label for="edit-radio-9"><img class="bg-img-option"
                                        src="/course-images/IMG-20260215-WA0018.jpg"></label>

                            </div>
                        </form>
                        <div class="edit-modal-button-row">
                            <button type="submit" id="edit-modal-delete-button" class="modal-delete-button"
                                form="edit-course-modal-form" name="edit-course-delete">DELETE</button>
                            <button type="submit" id="edit-modal-edit-button" class="modal-edit-button"
                                form="edit-course-modal-form" name="edit-course-edit">EDIT</button>
                        </div>

                    </dialog>

                </div>
            </div>
            <div class="top-right">
                <div class="text-next-to-profile">
                    <p class="username" id="username">Username</p>
                    <p class="instructor-id">Instructor ID</p>
                </div>
                <div><img class="profile-photo" src="/black-icons/black-profile-96.png"></div>
            </div>
        </div>
        <!-- END OF TOP BAR OF THE MAIN PAGE (INCLUDES EDIT AND DELETE COURSE MODAL) -->
        <!-- MAIN PART OF THE MAIN PAGE - ANNOUNCEMENTS AREA -->
        <div class="announcements-area" id = "announcements-area">
            <div class="announcements-area-title">ANNOUNCEMENTS</div>

            <div class="announcements-of-one-course-card" id = "">
                <div class="announcement-card-course-title">

                        <div class="announcement-card-button-div"><button>NEW<img
                                    src="../public/black-icons/black-plus-24.png"></button></div>
                    </div>
                    
                    <div class="announcement-card-course-title-row">

                                    class="toggle-announcement-display"><img></div>
                        </div>
                        <div class="announcement-text-body">

                    </div>
                    
                </div>
            -->
            </div>
        </div>
    </div>
</body>
