<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Organizer - Average</title>
    <link rel="stylesheet" href="Average.css">
    
<body>

    <div class="card">
        <div class="title">Average</div>

        <div class="courseRow">
            <div class="courseLabel">
                <span>ENGR 201</span>
                <span id="engr201-percent">0%</span>
            </div>
            <div class="barBackground">
                <div class="barFill" id="engr201-bar"></div>
            </div>
        </div>

        <div class="courseRow">
            <div class="courseLabel">
                <span>COMP 232</span>
                <span id="comp232-percent">0%</span>
            </div>
            <div class="barBackground">
                <div class="barFill" id="comp232-bar"></div>
            </div>
        </div>

        <div class="courseRow">
            <div class="courseLabel">
                <span>SOEN 228</span>
                <span id="soen228-percent">0%</span>
            </div>
            <div class="barBackground">
                <div class="barFill" id="soen228-bar"></div>
            </div>
        </div>

        <div class="courseRow">
            <div class="courseLabel">
                <span>COMP 248</span>
                <span id="comp248-percent">0%</span>
            </div>
            <div class="barBackground">
                <div class="barFill" id="comp248-bar"></div>
            </div>
        </div>

        <hr class="divider">

        <div class="overall">
            Overall Average<br>
            <span class="overallNumber" id="overall-percent">0%</span>
        </div>
    </div>

    <script>
        const courses = [
            { id: "engr201", grades: [80, 75, 100] },
            { id: "comp232", grades: [50, 40, 45] },
            { id: "soen228", grades: [85, 90, 80] },
            { id: "comp248", grades: [60, 55, 70] }
        ];

        function calculateAverage(grades) {
            let total = 0;
            for (let i = 0; i < grades.length; i++) {
                total += grades[i];
            }
            return Math.round(total / grades.length);
        }

        let totalAvg = 0;

        courses.forEach(course => {
            const avg = calculateAverage(course.grades);
            totalAvg += avg;
            document.getElementById(course.id + "-percent").textContent = avg + "%";
            document.getElementById(course.id + "-bar").style.width = avg + "%";
        });

        const overall = Math.round(totalAvg / courses.length);
        document.getElementById("overall-percent").textContent = overall + "%";
    </script>

</body>
</html>
