                        </div>
                            <form id="add-course-modal-form" action="/api/student/add-course" method="post">
                                <div class="modal-block">
                                    <label for="ask-code">Course code</label>
                                    <input type="text" id="ask-code" placeholder="ex: ENGR 233" name="code">
                                </div>
                                <div class="modal-block">
                                    <label for="course-select-section">Section</label>
                                    <select id="course-select-section" name="section">
                                        <option>Select</option>
                                    </select>
                                </div>
                            </form>

                            <div>
                                <button type="submit" class="modal-add-button" form="add-course-modal-form">ADD</button>

                        </dialog>
