<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Organizer - Signup</title>
    <link rel="stylesheet" href="CourseOrganizer_Signin_Styles.css">
</head>
<body>
    <div class="page">
        <div class="card">
           <h1 class="title">Course Organizer</h1>
           <p class="subtitle">Manage your courses with ease!</p>
           <h2 class="formTitle">Sign In</h2>
           
           <form class="form" action="#" method="post">
            <label class="label" for="email">Email</label>
            <input class= "input" type="email" id="email" name="email" placeholder="Enter your email"/>

            <label class="label" for="password">Password</label>
            <input class="input" type="password" id="password" name="password" placeholder="Enter your password" />
             <button class="button" type="submit">Sign In</button>
           </form>
           <p class="bottomText">
              Don't have an account? 
              <a href="CourseOrganizer_CreateAccount.html">Create Account</a>
            </p>
           
        </div>
        </div>
    </body>

</html>
