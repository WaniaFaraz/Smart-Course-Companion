<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Organizer - Create Account</title>
    <link rel="stylesheet" href="CourseOrganizer_CreateAccount.css">
</head>
<body>
    <div class="page">
        <div class="card">
           <h1 class="title">Course Organizer</h1>
           <p class="subtitle">Manage your courses with ease!</p>
           <h2 class="formTitle">Create Account</h2>
           
           <form class="form" action="#" method="post">
            <label class="label" for="name">Full Name</label>
            <input class= "input" type="text" id="name" name="name" placeholder="Enter your name"/>

            <label class="label" for="email">Email</label>
            <input class= "input" type="email" id="email" name="email" placeholder="Enter your email"/>

            <label class="label" for="password">Password</label>
            <input class="input" type="password" id="password" name="password" placeholder="Create a password" />
             
            <label class="label" for="confirmPassword">Confirm Password</label>
            <input class= "input" type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password"/>

            <button class="button" type="submit">Create Account</button>
           </form>
           <p class="bottomText">
              Already have an account? 
              <a href="CourseOrganizer_Signin.html">Sign In</a>
            </p>
           
        </div>
        </div>
    </body>

</html>
