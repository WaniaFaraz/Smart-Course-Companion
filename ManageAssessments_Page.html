<!DOCTYPE html>
<html>

<head>
    <title> Manage assessments </title>
    <link rel="stylesheet" href="ManageAssessments_Page_Styles.css">
</head>

<body>

    <h1>MY ASSESSMENTS</h1>
    <p class= "subtitle"> Track and manage your assessments</p>

    <section class= "summary">
        <div class= "card">
            <h2>5</h2>
            <p>Total</p>
        </div>

        <div class= "card">
            <h2>2</h2>
            <p>Completed</p>
        </div>

        <div class= "card">
            <h2>3</h2>
            <p>Pending</p>
        </div>

    </section>

    <section class= "filters">
        <div class="status-filter"
            <button class= "fitler" >All</button>
            <button class= "fitler">Pending</button>
            <button class= "fitler">Completed</button>
        </div>
        <div class= "course-filter"
            <button class= "fitler">All Courses</button>
            <button class= "fitler">SOEN 287</button>
            <button class= "fitler">ENGR 233</button>
            <button class= "fitler">COMP 249</button>
        </div>

    </section>

    <section class= "assessments">
        <div class="assessment-card">
            <input type="checkbox" id="ass1" class="status">
            <label for="ass1">Website Project</label>
            <div class="assessment-details">
                <h3>Website Projet</h3>
                <p>SOEN 287</p>
            </div>
            <button class="delete-assessment">Delete</button>
        </div>

        <div class="assessment-card">
            <input type="checkbox" id="ass2" class="status">
            <label for="ass2">Assignment #1</label>
            <div class="assessment-details">
                <h3>Assigment #1</h3>
                <p>COMP 249</p>
            </div>
            <button class="delete-assessment">Delete</button>
        </div>

        <div class="assessment-card">
            <input type="checkbox" id="ass3" class="status">
            <label for="ass3">Team Project</label>
            <div class="assessment-details">
                <h3>Team Project</h3>
                <p>ENGR 233</p>
            </div>
            <button class="delete-assessment">Delete</button>
        </div>

        <div class="assessment-card">
            <input type="checkbox" id="ass4" class="status">
            <label for="ass4">Assignment #2</label>
            <div class="assessment-details">
                <h3>Assignment #2</h3>
                <p>SOEN 287</p>
            </div>
            <button class="delete-assessment">Delete</button>
        </div>

        <div class="assessment-card">
            <input type="checkbox" id="ass5" class="status">
            <label for="ass5">Online Quiz</label>
            <div class="assessment-details">
                <h3>Online Quiz</h3>
                <p>ENGR 233</p>
            </div>
            <button class="delete-assessment">Delete</button>
        </div>
    </section>

</body>

</html>
